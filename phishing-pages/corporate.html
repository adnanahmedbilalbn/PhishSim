<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Portal — Sign In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1729;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .sim-banner {
      background: #fce8e6;
      color: #c5221f;
      text-align: center;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
    }
    .container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1a2332;
      border: 1px solid #2a3548;
      border-radius: 10px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-box {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border-radius: 12px;
      margin: 0 auto 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: #fff;
    }
    h1 {
      font-size: 20px;
      color: #e2e8f0;
      text-align: center;
      margin-bottom: 4px;
    }
    .subtitle {
      text-align: center;
      color: #64748b;
      font-size: 13px;
      margin-bottom: 28px;
    }
    .input-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      background: #0f1729;
      border: 1px solid #2a3548;
      border-radius: 6px;
      font-size: 14px;
      color: #e2e8f0;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #3b82f6; }
    input::placeholder { color: #475569; }
    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .remember input { width: 16px; height: 16px; accent-color: #3b82f6; }
    .remember label {
      text-transform: none;
      letter-spacing: 0;
      font-weight: 400;
      color: #94a3b8;
      margin: 0;
      font-size: 13px;
    }
    .btn-login {
      width: 100%;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-login:hover { background: #2563eb; }
    .btn-login:disabled { background: #334155; cursor: not-allowed; }
    .help-link {
      text-align: center;
      margin-top: 18px;
      font-size: 13px;
    }
    .help-link a { color: #3b82f6; text-decoration: none; }
    .help-link a:hover { text-decoration: underline; }
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: #475569;
    }
    .preview-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .preview-overlay.active { display: flex; }
    .preview-msg {
      background: #1a2332;
      color: #94a3b8;
      padding: 24px 32px;
      border-radius: 8px;
      font-size: 14px;
      border: 1px solid #2a3548;
    }
  </style>
</head>
<body>
  <div class="sim-banner">⚠️ SIMULATION — This is a cybersecurity training exercise</div>

  <div class="container">
    <div class="card">
      <div class="logo">
        <div class="logo-box">AC</div>
        <h1>Employee Portal</h1>
        <p class="subtitle">Apex Corporation — Internal Systems</p>
      </div>

      <form id="loginForm">
        <input type="hidden" name="campaign_id" id="campaign_id" value="CAMPAIGN_ID_PLACEHOLDER">
        <input type="hidden" name="target_id" id="target_id" value="TARGET_ID_PLACEHOLDER">

        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="email" placeholder="firstname.lastname" required>
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" required>
        </div>
        <div class="remember">
          <input type="checkbox" id="remember" name="remember">
          <label for="remember">Remember me on this device</label>
        </div>
        <button type="submit" class="btn-login" id="btnSubmit">Sign In</button>
      </form>

      <div class="help-link">
        <a href="#">Contact IT Support</a>
      </div>
      <div class="footer">Authorized personnel only. All access is monitored.</div>
    </div>
  </div>

  <div class="preview-overlay" id="previewOverlay">
    <div class="preview-msg">Preview mode — form submission disabled</div>
  </div>

  <img id="trackingPixel" src="" width="1" height="1" style="position:absolute;opacity:0;" alt="">

  <script>
    const params = new URLSearchParams(window.location.search);
    const isPreview = params.get('preview') === 'true';
    const targetId = params.get('target_id') || 'TARGET_ID_PLACEHOLDER';
    const campaignId = params.get('campaign_id') || 'CAMPAIGN_ID_PLACEHOLDER';

    document.getElementById('target_id').value = targetId;
    document.getElementById('campaign_id').value = campaignId;
    document.getElementById('trackingPixel').src =
      `http://localhost:4000/track/pixel/${targetId}/${campaignId}`;

    if (isPreview) {
      document.getElementById('previewOverlay').classList.add('active');
      document.querySelectorAll('input, button').forEach(el => el.disabled = true);
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (isPreview) return;

      const email = document.getElementById('username').value;
      try {
        const res = await fetch('http://localhost:4000/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, campaign_id: campaignId, target_id: targetId }),
        });
        const data = await res.json();
        window.location.href = data.redirect || 'https://www.linkedin.com';
      } catch (err) {
        window.location.href = 'https://www.linkedin.com';
      }
    });
  </script>
</body>
</html>
